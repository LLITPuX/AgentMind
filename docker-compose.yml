version: '3.8'

services:
  # FalkorDB - графова база даних
  falkordb:
    image: falkordb/falkordb:latest
    container_name: agentmind-falkordb
    ports:
      - "6379:6379"
    volumes:
      - falkordb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentmind-network

  # Backend - FastAPI + LangGraph
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentmind-backend
    depends_on:
      falkordb:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=development
    restart: unless-stopped
    networks:
      - agentmind-network
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend - Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentmind-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    restart: unless-stopped
    networks:
      - agentmind-network

volumes:
  falkordb_data:
    driver: local

networks:
  agentmind-network:
    driver: bridge

